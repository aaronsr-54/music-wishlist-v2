<button
  class="cursor-pointer border-none bg-transparent p-0 text-left font-body transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] hover:scale-[1.03] active:scale-[0.97] hover:shadow-xl hover:shadow-black/15 dark:hover:shadow-black/40 rounded-card"
  (click)="onArtistClick.emit(artist())"
>
  <div class="relative w-full aspect-square mb-1 rounded-card overflow-hidden group">
    @if (artist().image?.trim()) {
      <img
        [src]="artist().image"
        [alt]="artist().name"
        loading="lazy"
        class="w-full h-full object-cover transition-transform duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-105"
      />
    }
    <button
      class="absolute top-1 right-1 w-6 h-6 rounded-full border-none cursor-pointer flex items-center justify-center transition-all duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] p-0 text-sm"
      [class]="
        isFavorite()
          ? 'bg-bone text-ink'
          : 'bg-black/40 text-white hover:bg-black/70'
      "
      [style.animation]="
        isFavorite() ? 'popIn var(--dur-fast) var(--ease)' : null
      "
      (click)="toggleFavorite($event)"
      [title]="isFavorite() ? 'Quitar de favoritos' : 'Añadir a favoritos'"
    >
      @if (isFavorite()) {
        <app-icon name="heart-filled" class="w-4 h-4" />
      } @else {
        <app-icon name="heart" class="w-4 h-4" />
      }
    </button>
  </div>
  <div class="flex-1 flex flex-col">
    <span
      class="font-display text-base font-semibold text-bone-900 whitespace-nowrap overflow-hidden text-ellipsis leading-[1.2]"
      >{{ artist().name }}</span
    >
  </div>
</button>
