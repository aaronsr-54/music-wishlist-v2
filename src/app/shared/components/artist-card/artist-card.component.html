<button class="artist-card" (click)="onArtistClick.emit(artist())">
  <div class="cover-container">
    @if (artist().image?.trim()) {
      <img [src]="artist().image" [alt]="artist().name" loading="lazy" />
    }
    <button
      class="favorite-btn"
      [class.filled]="isFavorite()"
      (click)="toggleFavorite($event)"
      [title]="isFavorite() ? 'Quitar de favoritos' : 'Añadir a favoritos'"
    >
      @if (isFavorite()) {
        <svg
          viewBox="0 0 16 18"
          fill="currentColor"
          stroke="currentColor"
          stroke-width="1"
        >
          <path
            d="M8 14.5c-3.5-2-6-4-6-6.5C2 6 3.5 4.5 5 4.5c1 0 2 .5 3 1.5 1-1 2-1.5 3-1.5 1.5 0 3 1.5 3 3.5 0 2.5-2.5 4.5-6 6.5z"
          />
        </svg>
      } @else {
        <svg viewBox="0 0 16 18" fill="none">
          <path
            d="M8 14.5c-3.5-2-6-4-6-6.5C2 6 3.5 4.5 5 4.5c1 0 2 .5 3 1.5 1-1 2-1.5 3-1.5 1.5 0 3 1.5 3 3.5 0 2.5-2.5 4.5-6 6.5z"
            stroke="currentColor"
            stroke-width="1"
            stroke-linejoin="round"
          />
        </svg>
      }
    </button>
  </div>
  <div class="artist-info">
    <span class="artist-name">{{ artist().name }}</span>
  </div>
</button>
