<button
  class="cursor-pointer transition-transform duration-fast ease-smooth border-none bg-transparent p-0 text-left font-body hover:scale-[1.02] active:scale-[0.98]"
  (click)="onArtistClick.emit(artist())"
>
  <div class="relative w-full aspect-square mb-1 rounded-md overflow-hidden bg-bone-200">
    @if (artist().image?.trim()) {
      <img [src]="artist().image" [alt]="artist().name" loading="lazy" class="w-full h-full object-cover" />
    }
    <button
      class="absolute top-1 right-1 w-6 h-6 rounded-full border-none cursor-pointer flex items-center justify-center transition-all duration-fast ease-smooth p-0 text-sm"
      [class]="isFavorite() ? 'bg-bone text-ink' : 'bg-black/40 text-white hover:bg-black/60'"
      [style.animation]="isFavorite() ? 'popIn var(--dur-fast) var(--ease)' : null"
      (click)="toggleFavorite($event)"
      [title]="isFavorite() ? 'Quitar de favoritos' : 'Añadir a favoritos'"
    >
      @if (isFavorite()) {
        <app-icon name="heart-filled" class="w-4 h-4" />
      } @else {
        <app-icon name="heart" class="w-4 h-4" />
      }
    </button>
  </div>
  <div class="flex-1 flex flex-col">
    <span class="font-display text-sm font-semibold text-bone-900 whitespace-nowrap overflow-hidden text-ellipsis leading-[1.2]">{{ artist().name }}</span>
  </div>
</button>
